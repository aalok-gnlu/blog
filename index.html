<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aalok Panday | Mind Canvas</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&family=Fira+Code:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-color: #030305;
            --accent: #00e5ff;
            --accent-secondary: #b066ff;
            --accent-glow: rgba(0, 229, 255, 0.3);
            --card-bg: rgba(15, 15, 20, 0.45);
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --border-light: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            touch-action: none;
        }

        /* Custom Premium Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.4);
        }

        /* Ambient Animated Background */
        .ambient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.4;
            animation: float 20s infinite ease-in-out alternate;
        }

        .glow-1 {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
            top: -10%;
            left: -10%;
            animation-delay: 0s;
        }

        .glow-2 {
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, var(--accent-secondary) 0%, transparent 70%);
            bottom: -20%;
            right: -10%;
            animation-delay: -5s;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) scale(1);
            }

            50% {
                transform: translate(5%, 10%) scale(1.1);
            }

            100% {
                transform: translate(-5%, -5%) scale(0.95);
            }
        }

        /* Fixed UI Overlays */
        #ui-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2.5rem;
        }

        .profile-badge {
            pointer-events: auto;
            background: rgba(10, 10, 12, 0.5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-light);
            padding: 2rem;
            border-radius: 24px;
            max-width: 380px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-origin: top left;
        }

        .profile-badge:hover {
            transform: translateY(-5px) scale(1.02);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), 0 0 40px rgba(0, 229, 255, 0.15);
        }

        .profile-badge h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff 0%, #a1a1aa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .profile-badge p {
            font-size: 0.95rem;
            font-weight: 300;
            line-height: 1.6;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }

        .social-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.75rem 1.5rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-light);
            color: var(--text-main);
            text-decoration: none;
            border-radius: 12px;
            font-size: 0.85rem;
            font-family: 'Fira Code', monospace;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .social-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: all 0.5s ease;
        }

        .social-link:hover::before {
            left: 100%;
        }

        .node.distant .node-inner {
            filter: blur(8px) brightness(0.5);
            opacity: 0.5;
            pointer-events: none !important;
        }

        .instructions {
            position: absolute;
            bottom: 2.5rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 10, 12, 0.6);
            padding: 0.8rem 1.8rem;
            border-radius: 30px;
            border: 1px solid var(--border-light);
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            backdrop-filter: blur(10px);
            color: var(--text-muted);
            transition: opacity 1s ease;
            pointer-events: none;
        }

        .instructions.hidden {
            opacity: 0;
        }

        /* Loading Screen */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        #loader.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1.5rem;
        }

        .loader-text {
            font-family: 'Fira Code', monospace;
            font-size: 0.9rem;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* The Big Canvas */
        #viewport {
            width: 100vw;
            height: 100vh;
            position: relative;
            perspective: 1400px;
            cursor: grab;
            background-image:
                radial-gradient(circle at center, rgba(255, 255, 255, 0.04) 1px, transparent 1px),
                radial-gradient(circle at center, rgba(255, 255, 255, 0.015) 2px, transparent 2px);
            background-size: 60px 60px, 200px 200px;
            z-index: 10;
        }

        #viewport:active {
            cursor: grabbing;
        }

        #world {
            width: 0;
            height: 0;
            position: absolute;
            top: 50%;
            left: 50%;
            transform-style: preserve-3d;
        }

        /* Nodes (Posts & Memories) */
        .node {
            position: absolute;
            transform-style: preserve-3d;
            cursor: pointer;
            margin-top: -150px;
            margin-left: -150px;
        }

        .node-inner {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-light);
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            pointer-events: auto;
            transform: translateZ(0) scale(0);
            /* Start scaled down for animation */
            opacity: 0;
            transition: transform 0.15s ease-out, box-shadow 0.3s ease, border-color 0.3s ease;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            position: relative;
        }

        /* Entrance Animation */
        .node-inner.entered {
            animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            0% {
                transform: translateZ(0) scale(0.5);
                opacity: 0;
            }

            100% {
                transform: translateZ(0) scale(1);
                opacity: 1;
            }
        }

        /* Hover Inner Glow */
        .node-inner::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 20px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, transparent 100%);
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
            z-index: 2;
        }

        .node:hover .node-inner {
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6), 0 0 30px rgba(0, 229, 255, 0.1);
        }

        .node:hover .node-inner::before {
            opacity: 1;
        }

        /* Type: Memory */
        .node.memory {
            width: 340px;
            margin-left: -170px;
        }

        .node.memory .image-wrapper {
            width: 100%;
            height: 260px;
            overflow: hidden;
            background: #000;
            position: relative;
        }

        .node.memory img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.7;
            transition: opacity 0.5s ease, transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .node:hover.memory img {
            opacity: 1;
            transform: scale(1.08);
        }

        .node.memory .meta {
            padding: 1.2rem;
            font-size: 0.9rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 300;
        }

        /* Type: Post */
        .node.post {
            width: 360px;
            margin-left: -180px;
        }

        .node.post .node-inner {
            padding: 2.5rem;
        }

        .node.post .category {
            font-family: 'Fira Code', monospace;
            color: var(--accent);
            font-size: 0.75rem;
            letter-spacing: 1px;
            margin-bottom: 1.2rem;
            text-transform: uppercase;
        }

        .node.post h2 {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 1rem;
            line-height: 1.2;
            color: #fff;
        }

        .node.post .date {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.4);
            font-weight: 500;
        }

        /* Type: Social and Project */
        .node.social {
            width: 320px;
            margin-left: -160px;
            text-align: center;
        }

        .node.project {
            width: 380px;
            margin-left: -190px;
        }

        .node.social .node-inner, .node.project .node-inner {
            padding: 2.5rem;
        }

        .node.portal {
            width: 260px;
            height: 260px;
            margin-top: -130px;
            margin-left: -130px;
            text-align: center;
            border-radius: 50%;
        }

        .node.portal .node-inner {
            background: rgba(20, 0, 50, 0.85);
            border-color: var(--accent-secondary);
            border-radius: 50% !important;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 40px rgba(176, 102, 255, 0.4);
        }

        .node.portal .node-inner.entered {
            animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards, pulsePortal 3s infinite alternate 0.8s;
            opacity: 1;
        }

        .project-preview {
            width: 100%;
            height: 180px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            margin-bottom: 1rem;
            pointer-events: none; /* Prevent iframe grabbing the clicks/scrolls */
            background: #000;
        }

        .social-icon {
            width: 60px;
            height: 60px;
            margin-bottom: 1.2rem;
            fill: none;
            stroke: currentColor;
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .node.social:hover .social-icon {
            transform: scale(1.2) translateY(-5px);
            filter: drop-shadow(0 0 20px currentColor);
        }

        @keyframes floatIcon {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .anim-float-1 { animation: floatIcon 3s ease-in-out infinite; }
        .anim-float-2 { animation: floatIcon 2.5s ease-in-out infinite; }
        .anim-float-3 { animation: floatIcon 3.5s ease-in-out infinite; }

        .node.social h2, .node.project h2 {
            font-size: 1.4rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 0.5rem;
        }
        
        .node.social .category {
            color: var(--text-muted);
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        .node.project .category {
            color: #00ffaa;
            font-family: 'Fira Code', monospace;
            font-size: 0.75rem;
            margin-bottom: 1rem;
            text-transform: uppercase;
        }

        /* Type: Portal */
        .node.portal {
            width: 280px;
            padding: 2.5rem;
            margin-left: -140px;
            text-align: center;
        }

        .node.portal .node-inner {
            background: rgba(40, 0, 80, 0.5);
            border-color: var(--accent-secondary);
            animation: pulsePortal 3s infinite alternate;
        }

        @keyframes pulsePortal {
            0% { box-shadow: 0 0 20px rgba(176, 102, 255, 0.2); transform: translateZ(0) scale(1); }
            100% { box-shadow: 0 0 60px rgba(176, 102, 255, 0.8); transform: translateZ(0) scale(1.05); }
        }

        .node.portal h2 {
            font-size: 1.8rem;
            color: #fff;
            margin-bottom: 0.5rem;
            font-weight: 800;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .node.portal p {
            color: var(--accent);
            font-size: 0.95rem;
            line-height: 1.5;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Premium Modal Overlay */
        #modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(0px);
            -webkit-backdrop-filter: blur(0px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease, backdrop-filter 0.5s ease;
        }

        #modal-overlay.active {
            opacity: 1;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            pointer-events: auto;
        }

        #modal-content {
            background: rgba(12, 12, 16, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 90%;
            max-width: 750px;
            max-height: 85vh;
            border-radius: 24px;
            overflow-y: auto;
            padding: 4rem;
            position: relative;
            transform: translateY(40px) scale(0.95);
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            user-select: text;
        }

        #modal-overlay.active #modal-content {
            transform: translateY(0) scale(1);
            opacity: 1;
        }

        .close-btn {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .close-btn:hover {
            background: #fff;
            color: #000;
            transform: rotate(90deg);
        }

        /* Rendered Content Styling inside Modal */
        .rendered-content {
            animation: fadeInContent 0.6s ease 0.2s both;
        }

        @keyframes fadeInContent {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .rendered-content img {
            width: 100%;
            border-radius: 16px;
            margin-bottom: 2.5rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .rendered-content p {
            font-size: 1.15rem;
            font-weight: 300;
            line-height: 1.8;
            margin-bottom: 1.8rem;
            color: #d4d4d8;
        }

        .rendered-content b,
        .rendered-content strong {
            color: #fff;
            font-weight: 600;
        }

        .rendered-content h1 {
            margin-bottom: 2rem;
            line-height: 1.1;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #ffffff 0%, #a1a1aa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .rendered-content h2 {
            margin-top: 3rem;
            margin-bottom: 1.2rem;
            color: #fff;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .rendered-content .memory-text {
            font-size: 1.25rem;
            line-height: 1.8;
            font-style: italic;
            font-weight: 300;
            border-left: 3px solid var(--accent);
            padding-left: 2rem;
            margin-top: 2.5rem;
            color: #e4e4e7;
        }

        /* Responsive */
        @media (max-width: 768px) {
            #ui-layer {
                padding: 1.5rem;
            }

            .profile-badge {
                padding: 1.5rem;
                max-width: 100%;
            }

            .profile-badge h1 {
                font-size: 1.6rem;
            }

            .instructions {
                font-size: 0.8rem;
                bottom: 1.5rem;
                width: 90%;
                padding: 0.6rem 1.2rem;
            }

            #modal-content {
                padding: 2rem;
                width: 95%;
                max-height: 90vh;
            }

            .node.memory {
                width: 300px;
                margin-left: -150px;
            }

            .node.post {
                width: 300px;
                padding: 2rem;
                margin-left: -150px;
            }

            .node.social, .node.project, .node.portal {
                width: 280px;
                margin-left: -140px;
            }
        }
    </style>
</head>

<body>

    <!-- Ambient Glowing Background -->
    <div class="ambient-bg">
        <div class="glow-orb glow-1"></div>
        <div class="glow-orb glow-2"></div>
    </div>

    <!-- Initial Loader -->
    <div id="loader">
        <div class="spinner"></div>
        <div class="loader-text">Initializing Universe...</div>
    </div>

    <!-- UI Overlay -->
    <div id="ui-layer">
        <div class="profile-badge">
            <h1>Aalok Panday</h1>
            <p>Law Student at GNLU | Writer | Tech Enthusiast. Exploring the intersections of life, law, and code.</p>
        </div>
        <div class="instructions" id="instruction-toast">Drag to Rotate • Scroll/Pinch to Zoom • Tap Cards</div>
    </div>

    <!-- 3D Viewport -->
    <div id="viewport">
        <div id="world">
            <!-- Nodes will be injected here via JS -->
        </div>
    </div>

    <!-- Modal -->
    <div id="modal-overlay">
        <div id="modal-content">
            <button class="close-btn" onclick="closeModal()">&times;</button>
            <div id="rendered-body" class="rendered-content"></div>
        </div>
    </div>

    <script>
        // --- DATA INJECTION ---
        let memories = [];
        let posts = [];
        let interactionStarted = false;

        async function loadDynamicData() {
            const maxFilesToCheck = 50;

            // Fetch Posts dynamically concurrently
            const postPromises = Array.from({ length: maxFilesToCheck }, (_, i) => 
                fetch(`posts/${i + 1}.json`).then(res => res.ok ? res.json() : null).catch(() => null)
            );

            // Fetch Memories dynamically concurrently
            const memoryPromises = Array.from({ length: maxFilesToCheck }, (_, i) => 
                fetch(`pics/${i + 1}.txt`).then(async res => {
                    if (res.ok) {
                        return { id: i + 1, pic: `pics/${i + 1}.jpeg`, text: await res.text() };
                    }
                    return null;
                }).catch(() => null)
            );

            const [postResults, memoryResults] = await Promise.all([
                Promise.all(postPromises),
                Promise.all(memoryPromises)
            ]);

            posts = postResults.filter(Boolean);
            memories = memoryResults.filter(Boolean);
        }

        // --- CORE ENGINE ---
        const world = document.getElementById('world');
        const viewport = document.getElementById('viewport');
        const instructionToast = document.getElementById('instruction-toast');
        const loader = document.getElementById('loader');
        const nodesData = [];

        // 3D Variables
        let currentRotX = 0;
        let currentRotY = 0;
        let targetRotX = 0;
        let targetRotY = 0;

        let currentZoom = -1500;
        let targetZoom = -1500;
        const maxZoomIn = 800;
        const maxZoomOut = -3500;

        // --- GALAXY NAVIGATION STATE ---
        const galaxies = {
            Posts: { x: 0, y: 0, z: 0 },
            Pictures: { x: 15000, y: 0, z: 0 },
            Social: { x: 0, y: 15000, z: 0 },
            Projects: { x: 0, y: 0, z: 15000 }
        };

        let currentGx = 0, currentGy = 0, currentGz = 0;
        let targetGx = 0, targetGy = 0, targetGz = 0;

        function jumpToGalaxy(galaxyName) {
            const g = galaxies[galaxyName];
            if (!g) return;
            
            targetGx = g.x;
            targetGy = g.y;
            targetGz = g.z;
            
            // Zoom out temporarily for warp effect
            const originalRotY = targetRotY;
            targetZoom = maxZoomOut;
            targetRotY += 45; // spin slightly during warp
            
            setTimeout(() => {
                targetZoom = -1500;
            }, 1000); // restore normal zoom
        }

        // --- GALAXY DATASOURCES ---
        const mySocials = [
            { platform: 'Instagram', title: '@aalokpanday2006', link: 'https://www.instagram.com/aalokpanday2006/', icon: 'instagram', anim: 'anim-float-1' },
            { platform: 'WhatsApp', title: '+91 9322120946', link: 'https://wa.me/+919322120946/', icon: 'whatsapp', anim: 'anim-float-2' },
            { platform: 'Telegram', title: '@o_oHeyo_o', link: 'https://t.me/o_oHeyo_o/', icon: 'telegram', anim: 'anim-float-3' },

        function getSocialIcon(type, animClass) {
            if(type === 'instagram') return `<svg class="social-icon ${animClass}" viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>`;
            if(type === 'whatsapp') return `<svg class="social-icon ${animClass}" viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>`;
            if(type === 'telegram') return `<svg class="social-icon ${animClass}" viewBox="0 0 24 24"><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon><line x1="22" y1="2" x2="11" y2="13"></line></svg>`;
            if(type === 'linkedin') return `<svg class="social-icon ${animClass}" viewBox="0 0 24 24"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path><rect x="2" y="9" width="4" height="12"></rect><circle cx="4" cy="4" r="2"></circle></svg>`;
            if(type === 'email') return `<svg class="social-icon ${animClass}" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>`;
            if(type === 'phone') return `<svg class="social-icon ${animClass}" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>`;
            return '';
        }

        function getSocialColor(type) {
            if(type === 'instagram') return '#E1306C';
            if(type === 'whatsapp') return '#25D366';
            if(type === 'telegram') return '#0088cc';
            if(type === 'linkedin') return '#0077b5';
            if(type === 'email') return '#ea4335';
            if(type === 'phone') return '#34a853';
            return '#fff';
        }

        // Spread nodes randomly in a 3D Spherical Cloud per Galaxy
        function createNodes() {
            const galaxyGroups = {
                Posts: posts.map(p => ({ type: 'post', data: p })),
                Pictures: memories.map(m => ({ type: 'memory', data: m })),
                Social: mySocials.map(s => ({ type: 'social', data: s })),
                Projects: myProjects.map(p => ({ type: 'project', data: p }))
            };

            let staggerIndex = 0;

            Object.keys(galaxyGroups).forEach((gName) => {
                const items = galaxyGroups[gName];
                const center = galaxies[gName];

                // 1. Generate Portals in a fixed ring around the galaxy so they are highly visible
                const otherGalaxies = Object.keys(galaxies).filter(k => k !== gName);
                const portalRadius = 450;
                otherGalaxies.forEach((dest, i) => {
                    // Spread portals evenly in a circle on the X-Y plane
                    const angle = (i / otherGalaxies.length) * Math.PI * 2;
                    const x = center.x + Math.sin(angle) * portalRadius;
                    const y = center.y + Math.cos(angle) * portalRadius;
                    const z = center.z - 200; // slightly forward towards the camera
                    
                    createSingleNode({ type: 'portal', data: { dest } }, x, y, z);
                });

                // 2. Generate random content nodes
                const cloudRadius = 800;
                items.sort(() => Math.random() - 0.5); // Shuffle local galaxy

                items.forEach((item) => {
                    const u = Math.random();
                    const v = Math.random();
                    const theta = u * 2.0 * Math.PI;
                    const phi = Math.acos(2.0 * v - 1.0);

                    const r = Math.pow(Math.random(), 0.5) * cloudRadius;

                    const lx = r * Math.sin(phi) * Math.cos(theta);
                    const ly = r * Math.sin(phi) * Math.sin(theta);
                    const lz = r * Math.cos(phi);

                    createSingleNode(item, center.x + lx, center.y + ly, center.z + lz);
                });
            });

            function createSingleNode(item, x, y, z) {
                const el = document.createElement('div');
                el.className = `node ${item.type}`;

                const inner = document.createElement('div');
                inner.className = 'node-inner';

                if (item.type === 'memory') {
                    inner.innerHTML = `
                        <div class="image-wrapper">
                            <img src="${item.data.pic}" alt="Memory" loading="lazy" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\\'http://www.w3.org/2000/svg\\' width=\\'100%\\' height=\\'100%\\'><rect width=\\'100%\\' height=\\'100%\\' fill=\\'%23111\\'/><text x=\\'50%\\' y=\\'50%\\' font-family=\\'Arial\\' font-size=\\'14\\' fill=\\'%23666\\' text-anchor=\\'middle\\'>Image missing locally</text></svg>'">
                        </div>
                        <div class="meta">${item.data.text}</div>
                    `;
                    el.onclick = () => openMemory(item.data);
                } else if (item.type === 'post') {
                    inner.innerHTML = `
                        <div class="category">${item.data.category}</div>
                        <h2>${item.data.title}</h2>
                        <div class="date">${item.data.date}</div>
                    `;
                    el.onclick = () => openPost(item.data);
                } else if (item.type === 'social') {
                    inner.innerHTML = `
                        <div class="icon-wrapper" style="color: ${getSocialColor(item.data.icon)};">
                            ${getSocialIcon(item.data.icon, item.data.anim)}
                        </div>
                        <div class="category">${item.data.platform}</div>
                        <h2>${item.data.title}</h2>
                    `;
                    el.onclick = () => { if (!isDragThresholdPassed) window.open(item.data.link, '_blank'); };
                } else if (item.type === 'project') {
                    inner.innerHTML = `
                        <iframe class="project-preview" src="${item.data.link}" tabindex="-1" title="${item.data.title}"></iframe>
                        <div class="category">Interactive Preview</div>
                        <h2>${item.data.title}</h2>
                    `;
                    el.onclick = () => { if (!isDragThresholdPassed) window.open(item.data.link, '_blank'); };
                } else if (item.type === 'portal') {
                    inner.innerHTML = `
                        <h2>${item.data.dest}</h2>
                        <p>Tap to Space Warp</p>
                    `;
                    el.onclick = () => {
                        if (isDragThresholdPassed) return;
                        jumpToGalaxy(item.data.dest);
                    };
                }

                // 3D Parallax Tilt on Hover
                el.addEventListener('mousemove', (e) => {
                    const rect = el.getBoundingClientRect();
                    const cx = e.clientX - rect.left - rect.width / 2;
                    const cy = e.clientY - rect.top - rect.height / 2;
                    inner.style.transform = `rotateX(${-cy / 15}deg) rotateY(${cx / 15}deg) translateZ(40px) scale(1.05)`;
                });

                el.addEventListener('mouseleave', () => {
                    inner.style.transform = `rotateX(0deg) rotateY(0deg) translateZ(0px) scale(1)`;
                });

                el.appendChild(inner);
                world.appendChild(el);

                nodesData.push({ el, inner, x, y, z });

                // Staggered Entrance Animation
                setTimeout(() => {
                    inner.classList.add('entered');
                }, 50 + (staggerIndex * 20));
                staggerIndex++;
            }
        }

        // --- ORBIT & ZOOM PHYSICS ---
        let isDragging = false;
        let isDragThresholdPassed = false;
        let lastClientX = 0, lastClientY = 0;

        let initialPinchDistance = null;
        let initialZoom = 0;

        function updatePhysics() {
            // Smooth interpolation
            currentRotX += (targetRotX - currentRotX) * 0.06;
            currentRotY += (targetRotY - currentRotY) * 0.06;
            currentZoom += (targetZoom - currentZoom) * 0.08;
            
            // Interpolate camera to target galaxy position
            currentGx += (targetGx - currentGx) * 0.05;
            currentGy += (targetGy - currentGy) * 0.05;
            currentGz += (targetGz - currentGz) * 0.05;

            // Apply transformations to the world purely for zoom and orientation
            world.style.transform = `translateZ(${currentZoom}px) rotateX(${currentRotX}deg) rotateY(${currentRotY}deg)`;

            // Billboarding & Galaxy position offset
            nodesData.forEach(node => {
                const rx = node.x - currentGx;
                const ry = node.y - currentGy;
                const rz = node.z - currentGz;
                
                const distSq = rx*rx + ry*ry + rz*rz;
                if (distSq > Math.pow(30000, 2)) {
                    node.el.style.display = 'none';
                } else {
                    node.el.style.display = 'block';
                    node.el.style.transform = `translate3d(${rx}px, ${ry}px, ${rz}px) rotateY(${-currentRotY}deg) rotateX(${-currentRotX}deg)`;
                    
                    // Add distant blur effect if outside active galaxy (radius > 5000)
                    if (distSq > Math.pow(5000, 2)) {
                        if (!node.isDistant) {
                            node.el.classList.add('distant');
                            node.isDistant = true;
                        }
                    } else {
                        if (node.isDistant) {
                            node.el.classList.remove('distant');
                            node.isDistant = false;
                        }
                    }
                }
            });

            requestAnimationFrame(updatePhysics);
        }

        // --- INPUT HANDLERS ---
        function hideInstructions() {
            if (!interactionStarted) {
                interactionStarted = true;
                instructionToast.classList.add('hidden');
            }
        }

        function onPointerDown(e) {
            if (e.target.closest('#modal-overlay') || e.target.closest('.profile-badge')) return;
            if (e.touches && e.touches.length > 1) return;

            hideInstructions();

            isDragging = true;
            isDragThresholdPassed = false;

            lastClientX = e.touches ? e.touches[0].clientX : e.clientX;
            lastClientY = e.touches ? e.touches[0].clientY : e.clientY;
        }

        function onPointerMove(e) {
            if (e.touches && e.touches.length === 2) {
                hideInstructions();
                isDragging = false;
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (initialPinchDistance === null) {
                    initialPinchDistance = dist;
                    initialZoom = targetZoom;
                } else {
                    const delta = dist - initialPinchDistance;
                    targetZoom = initialZoom + (delta * 4.5);
                    if (targetZoom > maxZoomIn) targetZoom = maxZoomIn;
                    if (targetZoom < maxZoomOut) targetZoom = maxZoomOut;
                }
                return;
            }

            if (!isDragging) return;

            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;

            const dx = clientX - lastClientX;
            const dy = clientY - lastClientY;

            if (Math.abs(dx) > 3 || Math.abs(dy) > 3) isDragThresholdPassed = true;

            targetRotY += dx * 0.25;
            targetRotX -= dy * 0.25;

            if (targetRotX > 80) targetRotX = 80;
            if (targetRotX < -80) targetRotX = -80;

            lastClientX = clientX;
            lastClientY = clientY;
        }

        function onPointerUp(e) {
            isDragging = false;
            if (e.touches && e.touches.length < 2) {
                initialPinchDistance = null;
            }
        }

        window.addEventListener('wheel', (e) => {
            if (modalOverlay.classList.contains('active')) return;
            hideInstructions();

            targetZoom -= e.deltaY * 1.5;

            if (targetZoom > maxZoomIn) targetZoom = maxZoomIn;
            if (targetZoom < maxZoomOut) targetZoom = maxZoomOut;
        }, { passive: false });

        document.addEventListener('click', (e) => {
            if (isDragThresholdPassed && e.target.closest('.node')) {
                e.stopPropagation();
                e.preventDefault();
            }
        }, true);

        viewport.addEventListener('mousedown', onPointerDown);
        window.addEventListener('mousemove', onPointerMove);
        window.addEventListener('mouseup', onPointerUp);

        viewport.addEventListener('touchstart', onPointerDown, { passive: false });
        window.addEventListener('touchmove', onPointerMove, { passive: false });
        window.addEventListener('touchend', onPointerUp);


        // --- MODAL LOGIC ---
        const modalOverlay = document.getElementById('modal-overlay');
        const modalBody = document.getElementById('rendered-body');

        function openPost(post) {
            if (isDragThresholdPassed) return;

            // Re-trigger animation by removing and adding content
            modalBody.innerHTML = '';

            let html = '';
            post.content.forEach(block => {
                html += `<${block.tag}>${block.text}</${block.tag}>`;
            });

            setTimeout(() => {
                modalBody.innerHTML = html;
            }, 50);

            modalOverlay.classList.add('active');
        }

        function openMemory(memory) {
            if (isDragThresholdPassed) return;

            modalBody.innerHTML = '';

            setTimeout(() => {
                modalBody.innerHTML = `
                    <img src="${memory.pic}" alt="Memory Full" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\\'http://www.w3.org/2000/svg\\' width=\\'100%\\' height=\\'300\\'><rect width=\\'100%\\' height=\\'100%\\' fill=\\'%23111\\'/><text x=\\'50%\\' y=\\'50%\\' font-family=\\'Arial\\' font-size=\\'14\\' fill=\\'%23666\\' text-anchor=\\'middle\\'>Please place pics/ folder next to this file</text></svg>'">
                    <div class="memory-text">${memory.text.replace(/\n/g, '<br>')}</div>
                `;
            }, 50);

            modalOverlay.classList.add('active');
        }

        function closeModal() {
            modalOverlay.classList.remove('active');
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) closeModal();
        });

        // Initialize
        window.addEventListener('load', () => {
            loadDynamicData().then(() => {
                // Minimum loading time so the user sees the sleek loader
                setTimeout(() => {
                    loader.classList.add('hidden');
                    createNodes();

                    targetRotY = 45;
                    targetRotX = -10;
                }, 800);
            });

            requestAnimationFrame(updatePhysics);
        });

    </script>
